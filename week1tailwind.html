<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100 font-sans">

  <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow-md">
    <h1 class="text-2xl font-semibold mb-6 text-center text-indigo-600">User Registration</h1>

    <!-- Error Message -->
    <div id="error" class="hidden mb-4 p-2 text-sm bg-red-100 border border-red-400 text-red-700 rounded-md">
      Please fill all fields correctly.
    </div>

    <!-- Registration Form -->
    <form id="form" class="space-y-4">
      <input type="text" id="name" placeholder="Full Name" required
        class="w-full p-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">

      <input type="email" id="email" placeholder="Email Address" required
        class="w-full p-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">

      <input type="tel" id="phone" placeholder="Phone Number" required
        class="w-full p-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">

      <button type="submit"
        class="w-full py-2 bg-indigo-600 text-white font-medium rounded-md hover:bg-indigo-700">
        Register
      </button>
    </form>

    <!-- Success Message -->
    <div id="success" class="hidden mt-6 p-4 bg-green-100 border-l-4 border-green-500 text-green-700 rounded-lg">
      <p class="font-bold">Registration Successful!</p>
      <p id="details" class="text-sm"></p>
      <button id="reset" class="mt-2 px-3 py-1 bg-green-600 text-white text-xs rounded hover:bg-green-700">
        New Registration
      </button>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const error = document.getElementById('error');
    const success = document.getElementById('success');
    const details = document.getElementById('details');
    const resetBtn = document.getElementById('reset');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!name || !email || !phone) {
        error.classList.remove('hidden');
        return;
      }

      error.classList.add('hidden');
      details.textContent = `Registered: ${name}, Email: ${email}, Phone: ${phone}`;
      form.classList.add('hidden');
      success.classList.remove('hidden');
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      success.classList.add('hidden');
      form.classList.remove('hidden');
    });
  </script>
</body>
</html>
